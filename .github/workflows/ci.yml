name: CI

on:
  push:
    branches: [main, '001-*']
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: fixroute
          POSTGRES_USER: fixroute
          POSTGRES_PASSWORD: fixroute
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fixroute"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - working-directory: backend
        run: |
          pip install -r requirements/dev.txt
          ruff check .
          mypy .
      - working-directory: backend
        env:
          POSTGRES_HOST: localhost
        run: |
          pytest --cov=. --cov-report=term-missing

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }} }
      - working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run type-check
          npm run build

  ai-eval:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: ${{ env.PYTHON_VERSION }} }
      - working-directory: backend
        run: |
          pip install -r requirements/dev.txt
          pytest tests/eval/ -v

  build-images:
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t fixroute-backend:test -f backend/Dockerfile .
      - run: docker build -t fixroute-frontend:test -f frontend/Dockerfile .
